<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nairobi Nightowls — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="dash-page">

  <!-- Member header -->
  <header class="dash-header">
    <div class="card-wrap dash-card-wrap">
      <div class="member-card" id="memberCard">
        <div class="member-card-top">
          <span class="member-card-club">NIGHT OWLS</span>
          <span class="member-card-id revealed" id="cardId">MEM-????</span>
        </div>
        <div class="member-card-body">
          <span class="member-card-label">Member</span>
          <span class="member-card-name" id="cardName">—</span>
        </div>
        <div class="member-card-bottom">
          <span class="member-card-label">Status</span>
          <span class="member-card-dots">Active</span>
        </div>
        <div class="member-card-shine"></div>
      </div>
    </div>
    <div class="dash-welcome">
      <h1>Welcome back.</h1>
      <p id="welcomeText">You're signed in.</p>
      <button class="dash-signout" id="signOutBtn">Sign out</button>
    </div>
  </header>

  <!-- Owls Dynasty book catalog -->
  <section class="dynasty-section">
    <div class="dynasty-heading">
      <h2>Owls Dynasty</h2>
      <p>The club's reading list. Order a copy and we'll follow up to arrange payment and delivery.</p>
    </div>

    <p class="dynasty-status" id="dynastyStatus" role="status"></p>

    <div class="book-grid" id="bookGrid">
      <p class="book-empty">Loading the catalog…</p>
    </div>
  </section>

</div>

<script src="api.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
